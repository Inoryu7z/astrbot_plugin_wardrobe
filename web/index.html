<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衣橱图鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-icon">👗</span>
    <h1 class="topbar-title">衣橱图鉴</h1>
  </div>
  <div class="topbar-center">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="搜索描述、风格、场景..." class="search-input">
      <button id="searchBtn" class="search-btn">搜索</button>
    </div>
  </div>
  <div class="topbar-right">
    <button id="uploadBtn" class="btn btn-accent" title="上传图片">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上传
    </button>
    <button id="batchModeBtn" class="btn btn-secondary" title="批量操作">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      批量
    </button>
    <button id="logoutBtn" class="btn btn-ghost" title="退出登录">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<div class="main-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-heading">分类</h3>
      <div class="filter-group" id="categoryFilters">
        <label class="filter-item"><input type="radio" name="category" value="" checked><span class="filter-label">全部</span></label>
        <label class="filter-item"><input type="radio" name="category" value="人物"><span class="filter-label">人物</span></label>
        <label class="filter-item"><input type="radio" name="category" value="衣服"><span class="filter-label">衣服</span></label>
      </div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-heading">人格</h3>
      <div class="filter-group" id="personaFilters">
        <label class="filter-item"><input type="radio" name="persona" value="" checked><span class="filter-label">全部</span></label>
      </div>
    </div>
    <div class="sidebar-section stats-section">
      <h3 class="sidebar-heading">统计</h3>
      <div id="statsContent" class="stats-content">
        <div class="stat-item"><span class="stat-num" id="statTotal">-</span><span class="stat-label">总计</span></div>
        <div class="stat-item"><span class="stat-num" id="statPerson">-</span><span class="stat-label">人物</span></div>
        <div class="stat-item"><span class="stat-num" id="statCloth">-</span><span class="stat-label">衣服</span></div>
      </div>
    </div>
  </aside>

  <main class="content">
    <div class="batch-bar hidden" id="batchBar">
      <span id="batchCount">已选 0 张</span>
      <button class="btn btn-danger" id="batchDeleteBtn">删除选中</button>
      <button class="btn btn-ghost" id="batchCancelBtn">取消</button>
    </div>

    <div class="image-grid" id="imageGrid"></div>

    <div class="empty-state hidden" id="emptyState">
      <span class="empty-icon">🎀</span>
      <p class="empty-text">衣橱还是空的</p>
      <p class="empty-hint">上传一张图片开始吧</p>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<div class="modal-overlay hidden" id="detailModal">
  <div class="modal-card">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-body">
      <div class="modal-image-wrap">
        <img id="modalImage" class="modal-image" src="" alt="">
      </div>
      <div class="modal-info">
        <div class="modal-tags" id="modalTags"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <button class="btn btn-danger btn-sm" id="modalDeleteBtn">删除此图</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="uploadModal">
  <div class="modal-card modal-card-sm">
    <button class="modal-close" id="uploadModalClose">&times;</button>
    <h2 class="modal-title">上传图片</h2>
    <div class="upload-zone" id="uploadZone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p class="upload-text">点击或拖拽图片到此处</p>
      <input type="file" id="uploadFile" accept="image/*" class="hidden">
    </div>
    <div class="upload-preview hidden" id="uploadPreview">
      <img id="previewImg" src="" alt="预览">
    </div>
    <div class="upload-options">
      <label class="upload-label">人格（可选）</label>
      <select id="uploadPersona" class="upload-select">
        <option value="">不指定</option>
      </select>
    </div>
    <button class="btn btn-accent btn-block" id="uploadSubmit" disabled>保存到衣橱</button>
    <div id="uploadStatus" class="upload-status"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
